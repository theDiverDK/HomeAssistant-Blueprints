blueprint:
  name: Inform when not in use
  description: >-
    Sends a push notification when a selected power sensor has stayed under a
    chosen watt threshold for an entire period, and optionally sends a second
    notification when usage goes above the threshold again.

    On Home Assistant startup or automation reload, the blueprint waits the full
    configured period and then re-checks the sensor if it is already below the
    threshold. When recurring reminders are enabled, a new notification is sent
    for each full inactive period while usage stays below the threshold.

    The "usage above threshold again" notification is only sent after a previous
    "not in use" notification has already been sent for the current inactive
    period.
  domain: automation
  input:
    power_sensor:
      name: Power sensor
      description: Sensor with current power usage in Watts (W)
      selector:
        entity:
          domain: sensor
    max_watts:
      name: Max watt threshold
      description: Notification triggers when power stays below this value
      default: 10
      selector:
        number:
          min: 0
          max: 10000
          step: 0.1
          unit_of_measurement: W
          mode: box
    below_for:
      name: Period under threshold
      description: Must stay below max watts for the full period
      default:
        hours: 0
        minutes: 30
        seconds: 0
      selector:
        duration: {}
    mobile_device:
      name: Mobile device
      description: Phone/tablet that should receive the push notification
      selector:
        device:
          filter:
            integration: mobile_app
    notify_message:
      name: Notification message
      description: Message to send when not in use
      default: "Enheden har ikke været i brug i den valgte periode."
      selector:
        text:
    notify_once:
      name: Only one message per inactive period
      description: >-
        If enabled, only one notification is sent while usage stays below the
        threshold. A new notification can only be sent after usage has gone
        above the threshold again and a new inactive period starts.

        If disabled, the "not in use" notification is repeated once for every
        full inactive period while usage remains below the threshold.
      default: true
      selector:
        boolean: {}
    notify_on_above:
      name: Notify when usage goes above threshold again
      description: >-
        Send an extra push notification when the device is in use again.
        This is only sent after a previous "not in use" notification.
      default: true
      selector:
        boolean: {}
    notify_message_above:
      name: Message when usage goes above threshold
      description: Message sent when usage goes above the threshold again
      default: "Enheden er i brug igen."
      selector:
        text:

mode: single

variables:
  notify_once: !input notify_once
  notify_on_above: !input notify_on_above

trigger:
  - platform: numeric_state
    id: below_for_continuous
    entity_id: !input power_sensor
    below: !input max_watts
    for: !input below_for

  - platform: homeassistant
    id: startup_check
    event: start

  - platform: event
    id: startup_check
    event_type: automation_reloaded

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: startup_check
          - condition: numeric_state
            entity_id: !input power_sensor
            below: !input max_watts
        sequence:
          - delay: !input below_for
          - condition: numeric_state
            entity_id: !input power_sensor
            below: !input max_watts
      - conditions:
          - condition: trigger
            id: below_for_continuous
        sequence: []
    default:
      - stop: No qualifying inactive period detected

  - device_id: !input mobile_device
    domain: mobile_app
    type: notify
    message: !input notify_message

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notify_once }}"
        sequence:
          - wait_for_trigger:
              - platform: numeric_state
                entity_id: !input power_sensor
                above: !input max_watts
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ notify_on_above }}"
                sequence:
                  - device_id: !input mobile_device
                    domain: mobile_app
                    type: notify
                    message: !input notify_message_above
    default:
      - repeat:
          until:
            - condition: template
              value_template: "{{ wait.trigger is not none }}"
          sequence:
            - wait_for_trigger:
                - platform: numeric_state
                  entity_id: !input power_sensor
                  above: !input max_watts
              timeout: !input below_for
              continue_on_timeout: true
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ wait.trigger is none }}"
                    - condition: numeric_state
                      entity_id: !input power_sensor
                      below: !input max_watts
                  sequence:
                    - device_id: !input mobile_device
                      domain: mobile_app
                      type: notify
                      message: !input notify_message
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ notify_on_above and wait.trigger is not none }}"
            sequence:
              - device_id: !input mobile_device
                domain: mobile_app
                type: notify
                message: !input notify_message_above
