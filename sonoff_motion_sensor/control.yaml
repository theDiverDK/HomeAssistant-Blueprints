blueprint:
  name: Sonoff SBZ-03 Motion sensor light on/off with delay
  description: >
    Turn on lights when motion is detected, and turn them off after a
    configurable delay when no motion is detected.
  domain: automation
  input:
    motion_sensor:
      name: Motion Sensor
      description: Select the motion sensor (binary sensor) that will trigger the lights.
      selector:
        entity:
          domain: binary_sensor
          device_class: occupancy
    target_lights:
      name: Target Lights
      description: Select one or more lights to turn on/off.
      selector:
        target:
          entity:
            domain: 
              - light
              - switch
    delay_time:
      name: Delay Time
      description: The time to wait in minutes after no motion is detected before turning off the lights.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          step: 1
          mode: slider
          unit_of_measurement: minutes

trigger:
  - platform: state
    id: motion_detected
    entity_id: !input motion_sensor
    to: "on"
  - platform: state
    id: motion_cleared
    entity_id: !input motion_sensor
    to: "off"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: motion_detected
        sequence:
          - service: homeassistant.turn_on
            target: !input target_lights
      - conditions:
          - condition: trigger
            id: motion_cleared
        sequence:
          - delay:
              minutes: !input delay_time
          - condition: state
            entity_id: !input motion_sensor
            state: "off"
          - service: homeassistant.turn_off
            target: !input target_lights

mode: restart
